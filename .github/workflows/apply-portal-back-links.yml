name: Apply Portal Back Links

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/add_portal_back_links.py
      - .github/workflows/apply-portal-back-links.yml

permissions:
  contents: write

jobs:
  apply-portal-back-links:
    name: Add Back to Portal links to modules
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply Back to Portal links
        run: python scripts/add_portal_back_links.py

      - name: Run link audit
        run: python scripts/link_audit.py

      - name: Commit module updates
        run: |
          if git diff --quiet; then
            echo "No module changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Introduction Intermediate Advanced
          git commit -m "Add portal back links to training modules"
          git push
